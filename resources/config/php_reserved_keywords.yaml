# PHP Reserved Keywords — used by NamingResolver to detect collisions
# When a generated class/property name matches, it will be prefixed with '_'

# Case-insensitive keywords (checked via strtolower)
keywords:
  - abstract
  - and
  - array
  - as
  - bool
  - break
  - callable
  - case
  - catch
  - class
  - clone
  - const
  - continue
  - declare
  - default
  - die
  - do
  - echo
  - else
  - elseif
  - empty
  - enddeclare
  - endfor
  - endforeach
  - endif
  - endswitch
  - endwhile
  - enum
  - eval
  - exit
  - extends
  - 'false'
  - final
  - finally
  - float
  - fn
  - for
  - foreach
  - function
  - global
  - goto
  - if
  - implements
  - include
  - include_once
  - instanceof
  - insteadof
  - int
  - interface
  - isset
  - list
  - match
  - mixed
  - namespace
  - never
  - new
  - 'null'
  - object
  - or
  - print
  - private
  - protected
  - public
  - readonly
  - require
  - require_once
  - return
  - self
  - static
  - string
  - switch
  - throw
  - trait
  - 'true'
  - try
  - unset
  - use
  - var
  - void
  - while
  - xor
  - yield

# Case-sensitive constants (checked as-is)
constants:
  - __CLASS__
  - __DIR__
  - __FILE__
  - __FUNCTION__
  - __LINE__
  - __METHOD__
  - __NAMESPACE__
  - __TRAIT__
  - DIRECTORY_SEPARATOR
  - E_ALL
  - E_COMPILE_ERROR
  - E_COMPILE_WARNING
  - E_CORE_ERROR
  - E_CORE_WARNING
  - E_DEPRECATED
  - E_ERROR
  - E_NOTICE
  - E_PARSE
  - E_RECOVERABLE_ERROR
  - E_STRICT
  - E_USER_DEPRECATED
  - E_USER_ERROR
  - E_USER_NOTICE
  - E_USER_WARNING
  - E_WARNING
  - 'FALSE'
  - INF
  - NAN
  - 'NULL'
  - PHP_EOL
  - PHP_INT_MAX
  - PHP_INT_MIN
  - PHP_INT_SIZE
  - PHP_MAJOR_VERSION
  - PHP_MINOR_VERSION
  - PHP_OS
  - PHP_RELEASE_VERSION
  - PHP_SAPI
  - PHP_VERSION
  - PHP_VERSION_ID
  - STDERR
  - STDIN
  - STDOUT
  - 'TRUE'
